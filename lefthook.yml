commit-msg:
  commands:
    commitlint:
      # `mise exec` ensures node/npx resolve via mise-pinned versions
      # even in non-interactive shells (CI, GUI git clients).
      run: mise exec -- npx --no -- commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    zsh-syntax:
      glob: "*.zsh"
      run: |
        set -e
        for f in {staged_files}; do
          zsh -n "$f"
        done
    bats:
      # Run the full suite on every commit. ~1s, catches regressions in
      # plugin code, tests, or tooling changes that affect the runner.
      # Glob the directory so new *.bats files are picked up automatically.
      run: mise exec -- bats test/

pre-push:
  commands:
    check:
      # Full pre-PR suite: lint, bats, and the live smoke test. Smoke
      # skips (exit 0) if claude is missing or not authenticated, so it
      # never blocks a contributor who hasn't set up claude locally.
      run: mise run check
