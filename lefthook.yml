commit-msg:
  commands:
    commitlint:
      # `mise exec` ensures node/npx resolve via mise-pinned versions
      # even in non-interactive shells (CI, GUI git clients).
      run: mise exec -- npx --no -- commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    zsh-syntax:
      glob: "*.zsh"
      run: |
        set -e
        for f in {staged_files}; do
          zsh -n "$f"
        done
    bats:
      # Run the full suite on every commit. ~1s, catches regressions in
      # plugin code, tests, or tooling changes that affect the runner.
      run: mise exec -- bats test/plugin.bats
