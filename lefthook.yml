commit-msg:
  commands:
    commitlint:
      run: npx --no -- commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    zsh-syntax:
      glob: "*.zsh"
      run: |
        set -e
        for f in {staged_files}; do
          zsh -n "$f"
        done
    bats:
      # Run the full suite on every commit. It takes ~1s and catches
      # regressions in plugin code, test files, or refactors that don't
      # change a .zsh file directly (eg. a lefthook or mise tweak that
      # breaks the test runner itself).
      run: bats test/plugin.bats
